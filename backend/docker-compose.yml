version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENV=prod
      - DATABASE_URL=postgresql://postgres:password@db:5432/drishyam
      - REDIS_URL=redis://redis:6379/0
      - NEO4J_URI=bolt://neo4j:7687
      - SECRET_KEY=${SECRET_KEY}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
    depends_on:
      - db
      - redis
      - neo4j
    networks:
      - drishyam-net

  db:
    image: postgres:15-alphine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=drishyam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - drishyam-net

  redis:
    image: redis:7-alpine
    networks:
      - drishyam-net

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
    networks:
      - drishyam-net

networks:
  drishyam-net:
    driver: bridge

volumes:
  postgres_data:
  neo4j_data:
